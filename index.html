<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube再生</title>

<style>
body{
    margin:0;
    background:black;
}

#player{
    width:100vw;
    height:100vh;
}

#notify{
    position:fixed;
    top:10px;
    left:10px;
    z-index:1000;
    padding:10px;
}
</style>

</head>
<body>

<button id="notify">通知を許可</button>

<iframe
    id="player"
    src="https://www.youtube.com/embed/3mB0Uk5c2OU?autoplay=1&mute=1"
    title="YouTube video player"
    frameborder="0"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>
