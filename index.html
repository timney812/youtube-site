<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube再生</title>

<style>
body{
    margin:0;
    background:black;
}

#player{
    width:100vw;
    height:100vh;
}
</style>
</head>
<body>

<iframe
    id="player"
    src="https://www.youtube.com/embed/3mB0Uk5c2OU?autoplay=1&mute=1"
    title="YouTube video player"
    frameborder="0"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>通知テスト</title>
</head>
<body>

<h1>通知テスト</h1>
<button id="start">通知を開始</button>

<script>
document.getElementById("start").onclick = async () => {

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
        alert("通知が許可されませんでした");
        return;
    }

    function sendNotification() {
        new Notification("お知らせ", {
            body: "マジカル☆プリンセス見るな"
        });
    }

    sendNotification();

    setInterval(() => {
        sendNotification();
    }, 60000); // 60秒ごと
};
</script>

</body>
</html>
