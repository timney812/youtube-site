<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Player</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

#video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

</head>

<body>

<video
 id="video"
 autoplay
 loop
 controls
 playsinline> <source src="movie.mp4" type="video.mp4"> </video>
